version: '3.8'

services:
  # Next.js 애플리케이션
  nextjs:
    container_name: global-nomad-nextjs
    # 환경 변수로 이미지 지정 (기본값 제공)
    image: ${NEXTJS_IMAGE:-ghcr.io/cksgh5477/global-nomad:latest}
    # 로컬 개발용 빌드 설정 (프로덕션에서는 무시됨)
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    # 외부 포트 노출하지 않고, Nginx를 통해서만 접근

  # Nginx 리버스 프록시
  nginx:
    container_name: global-nomad-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Nginx 설정 파일
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 인증서 저장 위치
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - nextjs
    networks:
      - app-network
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  # Let's Encrypt 인증서 자동 갱신
  certbot:
    container_name: global-nomad-certbot
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# 네트워크 설정
networks:
  app-network:
    driver: bridge
